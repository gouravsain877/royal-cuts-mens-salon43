<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#b45309" />
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="20" fill="#1c1917" />
  <!-- Stylized Barber Scissors and Crown in Gold -->
  <g transform="translate(10, 10)">
    <!-- Crown -->
    <path d="M 25,25 L 35,38 L 50,22 L 65,38 L 75,25 L 70,50 L 30,50 Z" fill="url(#goldGrad)" />
    <!-- Scissors Handles -->
    <circle cx="38" cy="65" r="7" stroke="url(#goldGrad)" stroke-width="4" fill="none" />
    <circle cx="62" cy="65" r="7" stroke="url(#goldGrad)" stroke-width="4" fill="none" />
    <!-- Scissors Blades (Crossed) -->
    <line x1="38" y1="58" x2="57" y2="42" stroke="url(#goldGrad)" stroke-width="4" stroke-linecap="round" />
    <line x1="62" y1="58" x2="43" y2="42" stroke="url(#goldGrad)" stroke-width="4" stroke-linecap="round" />
  </g>
</svg>
